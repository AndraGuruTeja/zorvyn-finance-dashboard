<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Records Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #818cf8; --bg: #0f172a; --text: #f8fafc; --muted: #94a3b8; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 2rem; max-width: 1200px; margin: auto; }
        nav { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 2rem; }
        .links a { color: var(--text); margin-right: 1.5rem; text-decoration: none; font-weight: 500; }
        .links a.active { color: var(--primary); }
        button { padding: 0.8rem 1.5rem; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: 600; }
        button:hover { background: #6366f1; }
        button.btn-nav { background: rgba(255,255,255,0.1); padding: 0.5rem 1.5rem; }
        button.btn-nav:hover { background: rgba(255,255,255,0.2); }
        .form-card { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--muted); }
        input, select { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); }
        .error { color: #f87171; font-size: 0.9rem; margin-top: 1rem; display: none; }
    </style>
</head>
<body>
    <nav>
        <div class="links">
            <a href="dashboard.html">Dashboard</a>
            <a href="records.html" class="active">Records</a>
        </div>
        <button onclick="logout()" class="btn-nav">Logout</button>
    </nav>

    <div class="form-card">
        <h2 id="formTitle">Add Record</h2><br>
        <form id="recordForm">
            <input type="hidden" id="recordId">
            <div class="grid">
                <div><label>Type</label><select id="type"><option value="EXPENSE">Expense</option><option value="INCOME">Income</option></select></div>
                <div><label>Amount</label><input type="number" id="amount" step="0.01" required></div>
                <div><label>Category</label><input type="text" id="category" required></div>
                <div><label>Date</label><input type="date" id="date" required></div>
            </div>
            <div>
                <label>Notes</label>
                <input type="text" id="notes" style="margin-bottom: 1rem;">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button type="submit" id="submitBtn">Save Record</button>
                <button type="button" id="cancelBtn" style="display: none; background: #64748b;" onclick="resetForm()">Cancel Edit</button>
            </div>
            <div id="error-msg" class="error"></div>
        </form>
    </div>

    <h2>All Records</h2>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Notes</th>
                <th>Category</th>
                <th>Type</th>
                <th>Amount</th>
                <th id="actionsHeader" style="display:none">Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script src="app.js"></script>
    <script>
        checkAuth();
        const user = getUser();
        const isAdmin = user && user.role === 'ADMIN';
        let editingRecordId = null;

        async function loadRecords() {
            try {
                if (isAdmin) document.getElementById('actionsHeader').style.display = 'table-cell';

                const res = await apiCall('/api/records?size=100&sort=date,desc');
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                res.content.forEach(r => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${formatDate(r.date)}</td>
                            <td>${r.notes}</td>
                            <td>${r.category}</td>
                            <td>${r.type}</td>
                            <td style="color: ${r.type === 'INCOME' ? '#34d399' : '#f87171'}">
                                ${formatCurrency(r.amount)}
                            </td>
                            ${isAdmin ? `<td>
                                <button onclick='startEdit(${JSON.stringify(r)})' style="padding:0.4rem 1rem; font-size:0.8rem; margin-right: 0.5rem;">Edit</button>
                                <button onclick="deleteRecord(${r.id})" style="background:#f87171; padding:0.4rem 1rem; font-size:0.8rem">Delete</button>
                            </td>` : ''}
                        </tr>
                    `;
                });
            } catch (err) {
                if (err.message.includes("Invalid token") || err.message.includes("Access denied")) {
                    logout();
                } else alert(err.message);
            }
        }

        function startEdit(r) {
            editingRecordId = r.id;
            document.getElementById('formTitle').innerText = "Update Record";
            document.getElementById('submitBtn').innerText = "Update Record";
            document.getElementById('cancelBtn').style.display = "block";
            
            document.getElementById('type').value = r.type;
            document.getElementById('amount').value = r.amount;
            document.getElementById('category').value = r.category;
            document.getElementById('date').value = r.date;
            document.getElementById('notes').value = r.notes;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            editingRecordId = null;
            document.getElementById('recordForm').reset();
            document.getElementById('formTitle').innerText = "Add Record";
            document.getElementById('submitBtn').innerText = "Save Record";
            document.getElementById('cancelBtn').style.display = "none";
            document.getElementById('type').value = 'EXPENSE';
        }

        async function deleteRecord(id) {
            if (!confirm('Are you sure you want to delete this record?')) return;
            try {
                await apiCall(`/api/records/${id}`, 'DELETE');
                loadRecords();
            } catch (err) {
                alert(err.message);
            }
        }

        document.getElementById('recordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errBox = document.getElementById('error-msg');
            errBox.style.display = 'none';

            const payload = {
                type: document.getElementById('type').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                date: document.getElementById('date').value,
                notes: document.getElementById('notes').value
            };

            try {
                if (editingRecordId) {
                    await apiCall(`/api/records/${editingRecordId}`, 'PUT', payload);
                } else {
                    await apiCall('/api/records', 'POST', payload);
                }
                resetForm();
                loadRecords();
            } catch (err) {
                errBox.innerText = err.message;
                errBox.style.display = 'block';
            }
        });

        loadRecords();
    </script>
</body>
</html>
