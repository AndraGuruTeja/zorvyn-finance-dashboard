<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #818cf8; --bg: #0f172a; --text: #f8fafc; --muted: #94a3b8; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 2rem; max-width: 1200px; margin: auto; }
        nav { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 2rem; }
        .links a { color: var(--text); margin-right: 1.5rem; text-decoration: none; font-weight: 500; }
        .links a.active { color: var(--primary); }
        button { padding: 0.5rem 1.5rem; border: none; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; cursor: pointer; }
        button:hover { background: rgba(255,255,255,0.2); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }
        h3 { color: var(--muted); font-size: 1rem; margin-bottom: 0.5rem; }
        .val { font-size: 2rem; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); }
    </style>
</head>
<body>
    <nav>
        <div class="links">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="records.html">Records</a>
        </div>
        <button onclick="logout()">Logout</button>
    </nav>

    <h2>Overview</h2><br>
    
    <div class="grid">
        <div class="card">
            <h3>Net Balance</h3>
            <div class="val" id="netBalance">...</div>
        </div>
        <div class="card">
            <h3>Total Income</h3>
            <div class="val" id="totalIncome" style="color: #34d399">...</div>
        </div>
        <div class="card">
            <h3>Total Expenses</h3>
            <div class="val" id="totalExpenses" style="color: #f87171">...</div>
        </div>
    </div>

    <h2>Recent Transactions</h2>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Notes</th>
                <th>Category</th>
                <th>Amount</th>
                <th id="actionsHeader" style="display:none">Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script src="app.js"></script>
    <script>
        checkAuth();
        const user = getUser();
        const isAdmin = user && user.role === 'ADMIN';

        async function loadUI() {
            try {
                if (isAdmin) document.getElementById('actionsHeader').style.display = 'table-cell';

                const summary = await apiCall('/api/dashboard/summary');
                document.getElementById('netBalance').innerText = formatCurrency(summary.netBalance);
                document.getElementById('totalIncome').innerText = formatCurrency(summary.totalIncome);
                document.getElementById('totalExpenses').innerText = formatCurrency(summary.totalExpenses);

                const recent = await apiCall('/api/dashboard/recent');
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                recent.forEach(r => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${formatDate(r.date)}</td>
                            <td>${r.notes}</td>
                            <td>${r.category}</td>
                            <td style="color: ${r.type === 'INCOME' ? '#34d399' : '#f87171'}">
                                ${formatCurrency(r.amount)}
                            </td>
                            ${isAdmin ? `<td><button onclick="deleteRecord(${r.id})" style="background:#f87171; padding:0.4rem 1rem; font-size:0.8rem">Delete</button></td>` : ''}
                        </tr>
                    `;
                });
            } catch (err) {
                if (err.message.includes("Invalid token") || err.message.includes("Access denied")) {
                    logout();
                } else alert(err.message);
            }
        }

        async function deleteRecord(id) {
            if (!confirm('Are you sure you want to delete this record?')) return;
            try {
                await apiCall(`/api/records/${id}`, 'DELETE');
                loadUI();
            } catch (err) {
                alert(err.message);
            }
        }
        loadUI();
    </script>
</body>
</html>
